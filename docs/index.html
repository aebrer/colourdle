<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colourdle — Name That Colour</title>
  <meta name="color-scheme" content="light dark">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='12' fill='%23E8594F'/><rect x='15' y='15' width='70' height='70' rx='6' fill='%234BA3C3'/></svg>">
  <meta name="description" content="A daily colour-naming game. See a colour, guess its name. Scored by name similarity and perceptual colour distance across 3,000+ named colours.">
  <meta name="author" content="Drew Brereton">

  <!-- Open Graph -->
  <meta property="og:title" content="Colourdle — Name That Colour">
  <meta property="og:description" content="A daily colour-naming game. See a colour, guess its name. Scored by name similarity and perceptual colour distance.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://colourdle.ca">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Colourdle — Name That Colour">
  <meta name="twitter:description" content="A daily colour-naming game. See a colour, guess its name. Scored by name similarity and perceptual colour distance.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=1772912686">
</head>
<body>
  <div id="app">

    <!-- Start screen -->
    <div id="screen-start" class="screen active">
      <div class="chrome top">
        <span class="title">Colourdle</span>
        <span class="nav">
          <span class="btn-group">
            <button id="btn-daily" class="mode-btn active">Daily</button>
            <button id="btn-freeplay" class="mode-btn">Freeplay</button>
          </span>
        </span>
      </div>
      <div class="fill-centre">
        <p class="hero">Name that colour.</p>
        <p class="sub">5 colours. Guess each name.<br>Score by name + colour proximity.</p>
        <div class="start-options">
          <span class="btn-group">
            <button id="btn-classic" class="mode-btn active">Classic</button>
            <button id="btn-explore" class="mode-btn">Explore</button>
          </span>
          <select id="palette">
            <option value="All">All colours</option>
            <option value="Crayola">Crayola</option>
            <option value="Pantone">Pantone</option>
            <option value="XKCD">XKCD</option>

            <option value="RAL">RAL</option>
          </select>
        </div>

        <button id="btn-start" class="btn">Play</button>
        <div id="history" class="history"></div>
      </div>
      <div class="credit">by <a href="https://entropist.ca" target="_blank" rel="noopener">Drew Brereton</a> · <a href="about.html">about</a> · <a href="https://github.com/aebrer/colourdle" target="_blank" rel="noopener">source</a> · <button id="btn-theme" class="credit-btn" title="Toggle dark mode">&#9790;</button></div>
    </div>

    <!-- Game screen -->
    <div id="screen-game" class="screen">
      <div class="chrome top">
        <button id="round-counter" class="chrome-home">1 / 5</button>
        <span id="running-score">0</span>
      </div>
      <div class="fill-centre">
        <div id="game-source" class="source-subtitle"></div>
        <div class="input-row">
          <input type="text" id="guess-input" placeholder="write a colour name here" autocomplete="off" autocapitalize="off" spellcheck="false">
          <button id="btn-guess" class="btn">&rarr;</button>
        </div>
        <div id="iter-feedback" class="iter-feedback" style="display:none">
          <div id="iter-best" class="iter-highlight" style="display:none">
            <span class="iter-highlight-label">Best</span>
            <div id="iter-best-swatch" class="inline-swatch"></div>
            <span id="iter-best-name" class="guess-name"></span>
            <span id="iter-best-score" class="iter-highlight-score"></span>
          </div>
          <div id="iter-last" class="iter-highlight">
            <span class="iter-highlight-label">Last</span>
            <div id="iter-last-swatch" class="inline-swatch"></div>
            <span id="iter-last-name" class="guess-name"></span>
            <span id="iter-last-score" class="iter-highlight-score"></span>
          </div>
          <div id="iter-log" class="iter-log"></div>
          <div id="iter-status" class="iter-guess-count"></div>
        </div>
        <button id="btn-done" class="btn" style="display:none">Done</button>
        <button id="btn-finish" class="btn dim" style="display:none">Finish</button>
      </div>
    </div>

    <!-- Result screen -->
    <div id="screen-result" class="screen">
      <div class="chrome top">
        <button id="result-target-label" class="chrome-home">The colour was</button>
        <span id="result-target-source" class="source-tag"></span>
      </div>
      <div class="result-body">
        <div class="result-answer">
          <span id="result-target-name" class="big-name"></span>
        </div>
        <div class="result-guess-row">
          <div class="result-guess-left">
            <span id="result-guess-input" class="guess-label">You guessed: <strong id="result-guess-raw"></strong></span>
            <span id="result-guess-match" class="guess-label">Closest match by name: <strong id="result-guess-matched"></strong></span>
          </div>
          <div class="result-guess-right">
            <div id="result-guess-swatch" class="inline-swatch"></div>
            <span id="result-guess-source" class="source-tag"></span>
          </div>
        </div>
        <div class="scores">
          <div class="score-line">
            <span class="score-key">Name<span class="score-hint">How close is your guess to the name?</span></span>
            <span id="score-name" class="score-val">0</span>
          </div>
          <div class="score-line">
            <span class="score-key">Colour<span id="hint-hsb" class="score-hint"></span></span>
            <span id="score-hsb" class="score-val">0</span>
          </div>
          <div class="score-line total">
            <span class="score-key">Final</span>
            <span id="score-total" class="score-val">0</span>
          </div>
        </div>
        <button id="btn-next" class="btn">Next</button>
      </div>
    </div>

    <!-- Summary screen -->
    <div id="screen-summary" class="screen">
      <div class="chrome top">
        <button id="btn-back" class="btn dim" style="display:none">&larr;</button>
        <button id="summary-title" class="chrome-home">Results</button>
      </div>
      <div class="summary-body">
        <div id="summary-rounds"></div>
        <div id="summary-totals" class="summary-totals"></div>
        <div id="percentile" class="percentile" style="display:none"></div>
        <div class="summary-actions">
          <button id="btn-share" class="btn">Share</button>
          <button id="btn-play-again" class="btn dim">Play Again</button>
        </div>
        <div id="share-toast" class="toast">Copied to clipboard!</div>
      </div>
      <div class="credit">by <a href="https://entropist.ca" target="_blank" rel="noopener">Drew Brereton</a> · <a href="about.html">about</a> · <a href="https://github.com/aebrer/colourdle" target="_blank" rel="noopener">source</a></div>
    </div>

  </div>

  <script src="colors.js?v=1772912686"></script>
  <script src="game.js?v=1772912686"></script>
</body>
</html>
